name: "\U0001F41B Bug Report"
description: File a bug report
labels: ["🐛 bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      value: |
        1. Go to ...
        2. Tap on ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "P0 - App crash / data loss"
        - "P1 - Feature broken"
        - "P2 - Degraded experience"
        - "P3 - Minor / cosmetic"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device & OS
      placeholder: "iPhone 15 Pro, iOS 17.4"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or Sentry event ID

