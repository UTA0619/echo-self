name: "\U0001F4A1 Feature Request"
description: Propose a new feature
labels: ["💡 enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
  - type: dropdown
    id: epic
    attributes:
      label: Epic
      options:
        - "EPIC-01 Foundation"
        - "EPIC-02 Onboarding"
        - "EPIC-03 Daily Mirror"
        - "EPIC-04 Memory"
        - "EPIC-05 Future-Self"
        - "EPIC-06 Monetization"
        - "EPIC-07 Viral Growth"
        - "EPIC-08 Analytics"
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P0 - Critical"
        - "P1 - High"
        - "P2 - Medium"
        - "P3 - Low"
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done?

