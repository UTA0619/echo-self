name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high --json | tee audit-results.json || true
      - name: Check critical vulnerabilities
        run: |
          CRITICAL=$(cat audit-results.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat audit-results.json | jq '.metadata.vulnerabilities.high // 0')
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found"
            exit 1
          fi

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rls-audit:
    name: Supabase RLS Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all tables have RLS
        run: |
          # Scan migration files for tables without RLS
          TABLES_WITHOUT_RLS=0
          for file in supabase/migrations/*.sql; do
            # Find CREATE TABLE statements
            TABLES=$(grep -oP 'CREATE TABLE [\w.]+' "$file" | awk '{print $NF}' || true)
            for table in $TABLES; do
              # Check if corresponding RLS enable exists in same or later migration
              if ! grep -r "ENABLE ROW LEVEL SECURITY" supabase/migrations/ | grep -q "${table##*.}"; then
                echo "⚠️  Table missing RLS: $table in $file"
                TABLES_WITHOUT_RLS=$((TABLES_WITHOUT_RLS + 1))
              fi
            done
          done
          if [ "$TABLES_WITHOUT_RLS" -gt 0 ]; then
            echo "❌ $TABLES_WITHOUT_RLS table(s) missing RLS policies"
            exit 1
          fi
          echo "✅ All tables have RLS enabled"

  owasp-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'echo-self'
          path: '.'
          format: 'HTML'
          args: '--failOnCVSS 7'
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/
