name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.0)"
        required: true
        type: string
      skip_tests:
        description: "Skip test gate (emergency deploy only)"
        required: false
        default: false
        type: boolean

jobs:
  # ─── Gate: must pass CI before manual approval can proceed ───────────────
  pre-deploy-checks:
    name: Pre-deploy checks
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm turbo type-check

      - name: Validate migrations
        run: node --loader tsx scripts/validate-migrations.ts
        env:
          NODE_NO_WARNINGS: 1

  # ─── Manual approval gate ────────────────────────────────────────────────
  approve:
    name: Manual approval
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks]
    if: always() && (needs.pre-deploy-checks.result == 'success' || inputs.skip_tests)
    environment: production
    steps:
      - name: Production deploy approved
        run: echo "✅ Production deploy approved for v${{ inputs.version }}"

  # ─── DB migrations ───────────────────────────────────────────────────────
  migrate-db:
    name: Migrate production DB
    runs-on: ubuntu-latest
    needs: [approve]
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply pending migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_PROD }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}

  # ─── Edge functions ───────────────────────────────────────────────────────
  deploy-edge-functions:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    needs: [migrate-db]
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF_PROD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_PROD }}

  # ─── EAS production build + store submit ─────────────────────────────────
  eas-production:
    name: EAS build + submit
    runs-on: ubuntu-latest
    needs: [migrate-db]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: apps/mobile
        run: pnpm install --frozen-lockfile

      - name: EAS Build (production)
        working-directory: apps/mobile
        run: |
          eas build \
            --platform all \
            --profile production \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Submit to stores
        working-directory: apps/mobile
        run: |
          eas submit \
            --platform all \
            --profile production \
            --non-interactive \
            --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ─── GitHub Release ───────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-edge-functions, eas-production]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          make_latest: true
