name: Supabase Migrate

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/supabase/migrations/**'

jobs:
  migrate:
    name: ${{ github.ref_name == 'main' && 'Production' || 'Staging' }} DB Migration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        run: |
          supabase db push \
            --project-ref ${{ github.ref_name == 'main' && secrets.SUPABASE_PROJECT_REF_PROD || secrets.SUPABASE_PROJECT_REF_STAGING }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
